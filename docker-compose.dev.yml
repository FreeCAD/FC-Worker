services:
  redis:
    image: redis:alpine

  api:
    build:
      context: .
      dockerfile: ./Dockerfile.api.dev
    depends_on:
      - redis
    ports:
      - "9000:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./fc_worker:/app/fc_worker
      - ./main.py:/app/main.py

  celery-worker:
    build:
      context: .
      dockerfile: ./Dockerfile.celery.dev
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:3030}
    volumes:
      - ./fc_worker:/app/fc_worker
      - ./main.py:/app/main.py
